<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플래너</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --surface:#191919;
    --surface-2:#1F1F1E;
    --ink:#E8E9E5;
    --muted:#8A8C84;
    --hair:#2C2C2B;
    --hair-strong:#3A3A38;
    --accent:#56C07C;
    --accent-ink:#3FA968;
    --accent-soft:rgba(86,192,124,.16);
    --accent-soft2:rgba(86,192,124,.08);
    --mint:#9DEBC0;
    --warn:#C97B5E;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.25), 0 12px 30px rgba(0,0,0,.32);
    font-synthesis:none;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#191919;
    color:var(--ink);
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:6px;
  }
  .wrap{
    max-width:none;margin:0 auto;background:transparent;
    border:none;border-radius:0;box-shadow:none;overflow:visible;
  }

  /* ---------- top row: todo + routine ---------- */
  .panels{display:grid;grid-template-columns:1.4fr 1fr;gap:40px;padding:20px 14px 8px;align-items:start;}
  .col{display:flex;flex-direction:column;}
  .ph{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:10px;}
  .ph h3{margin:0;font-family:"Fraunces",serif;font-weight:500;font-size:19px;letter-spacing:-.01em;}
  .ph .sub{font:500 12px/1 "Pretendard";color:var(--muted);white-space:nowrap;}

  /* ---------- week achievement: full width ---------- */
  .week-section{padding:14px 14px 8px;}
  .week-body{display:flex;align-items:flex-end;gap:28px;}
  .week-body .bars{flex:1;}

  /* todo */
  .todo{display:flex;flex-direction:column;gap:2px;}
  .item{display:flex;align-items:center;gap:10px;padding:7px 6px;border-radius:8px;transition:background .12s;}
  .item:hover{background:var(--surface-2);}
  .cb{width:18px;height:18px;border:1.6px solid var(--hair-strong);border-radius:6px;flex:none;cursor:pointer;
      display:grid;place-items:center;background:transparent;transition:background .15s,border-color .15s;}
  .cb:hover{border-color:var(--accent);}
  .cb svg{width:11px;height:11px;stroke:#0E100E;stroke-width:3;fill:none;opacity:0;stroke-linecap:round;stroke-linejoin:round;}
  .item.done .cb{background:var(--accent);border-color:var(--accent);}
  .item.done .cb svg{opacity:1;}
  .label{font:450 14px/1.35 "Pretendard";flex:1;cursor:pointer;}
  .item.done .label{text-decoration:line-through;color:var(--muted);text-decoration-thickness:1.5px;}
  .tag{font:600 10px/1 "Pretendard";color:#D8C58E;background:rgba(150,120,50,.22);padding:3px 6px;border-radius:5px;flex:none;}
  .del{opacity:0;border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:5px;flex:none;}
  .item:hover .del{opacity:1;}
  .del:hover{color:var(--warn);background:rgba(201,123,94,.16);}
  .empty{font:450 13px/1.5 "Pretendard";color:var(--muted);padding:16px 6px;text-align:center;border:1px dashed var(--hair-strong);border-radius:10px;}

  .add{display:flex;gap:8px;margin-top:12px;}
  .add input{flex:1;font:450 13.5px/1 "Pretendard";padding:10px 12px;border-radius:9px;border:1px solid var(--hair-strong);
             background:var(--surface-2);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
  .add input::placeholder{color:#6B7065;}
  .add input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .add button{font:600 13px/1 "Pretendard";padding:0 14px;border-radius:9px;border:none;background:var(--accent);color:#0E100E;cursor:pointer;transition:background .15s;}
  .add button:hover{background:var(--mint);}

  .week-body .summary{margin-top:0;white-space:nowrap;}

  /* ---------- week achievement bars ---------- */
  .bars{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:end;height:96px;padding:0 2px;}
  .bcol{display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .btrack{width:100%;max-width:26px;height:100%;background:var(--surface-2);border-radius:7px;display:flex;align-items:flex-end;overflow:hidden;}
  .bfill{width:100%;background:var(--accent);border-radius:7px;transition:height .5s cubic-bezier(.2,.8,.2,1);min-height:0;}
  .bfill.zero{background:#33382F;}
  .bcol.is-today .blabel{color:var(--accent);font-weight:700;}
  .blabel{font:500 11px/1 "Pretendard";color:var(--muted);}
  .bcap{font:600 10px/1 "Pretendard";color:var(--muted);height:11px;}
  .summary{display:flex;align-items:baseline;gap:8px;margin-top:14px;}
  .summary .pct{font-family:"Fraunces",serif;font-weight:600;font-size:30px;color:var(--accent);letter-spacing:-.02em;}
  .summary .desc{font:450 12.5px/1.4 "Pretendard";color:var(--muted);}

  /* routines */
  .rt-list{display:flex;flex-direction:column;gap:6px;}
  .rt{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--hair);background:var(--surface-2);border-radius:9px;}
  .rt .ric{width:24px;height:24px;border-radius:7px;background:rgba(150,120,50,.18);color:#D8C58E;display:grid;place-items:center;font-size:12px;flex:none;}
  .rt .rtxt{flex:1;min-width:0;}
  .rt .rtxt b{font:600 13px/1.3 "Pretendard";display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rt .rtxt span{font:500 11px/1 "Pretendard";color:var(--muted);}
  .rt .del{opacity:.4;}
  .rt:hover .del{opacity:1;}
  .rt-toggle{font:600 12.5px/1 "Pretendard";color:var(--accent);background:var(--accent-soft2);border:1px solid var(--accent-soft);
             padding:9px 12px;border-radius:9px;cursor:pointer;width:100%;text-align:center;transition:background .15s;margin-top:10px;}
  .rt-toggle:hover{background:var(--accent-soft);}
  .rt-form{margin-top:10px;border:1px solid var(--hair-strong);border-radius:11px;padding:12px;background:var(--surface-2);display:none;flex-direction:column;gap:9px;}
  .rt-form.open{display:flex;}
  .rt-form input[type=text]{font:450 13px/1 "Pretendard";padding:9px 11px;border-radius:8px;border:1px solid var(--hair-strong);outline:none;background:var(--surface);color:var(--ink);}
  .rt-form input[type=text]::placeholder{color:#6B7065;}
  .rt-form input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .seg{display:flex;gap:6px;}
  .seg button{flex:1;font:600 12px/1 "Pretendard";padding:8px;border-radius:8px;cursor:pointer;border:1px solid var(--hair-strong);background:var(--surface);color:var(--muted);transition:all .15s;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#0E100E;}
  .picker{display:flex;flex-wrap:wrap;gap:5px;}
  .picker button{width:30px;height:30px;border-radius:8px;border:1px solid var(--hair-strong);background:var(--surface);color:var(--ink);font:500 12px/1 "Pretendard";cursor:pointer;transition:all .12s;}
  .picker button.on{background:var(--accent);border-color:var(--accent);color:#0E100E;}
  .rt-form .row{display:flex;align-items:center;gap:8px;}
  .rt-form .hint{font:500 11px/1.3 "Pretendard";color:var(--muted);}
  .rt-form .submit{font:600 13px/1 "Pretendard";background:var(--accent);color:#0E100E;border:none;padding:10px;border-radius:9px;cursor:pointer;}
  .rt-form .submit:hover{background:var(--mint);}
  select.mday{font:450 13px/1 "Pretendard";padding:8px 10px;border-radius:8px;border:1px solid var(--hair-strong);background:var(--surface);color:var(--ink);}

  /* ---------- calendar (bottom, grass) ---------- */
  .cal-section{padding:14px 14px 14px;}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-head .titlewrap{display:flex;align-items:baseline;gap:10px;}
  .cal-head h3{margin:0;font-family:"Fraunces",serif;font-weight:500;font-size:18px;}
  .cal-head .ym{font:500 13px/1 "Pretendard";color:var(--muted);letter-spacing:.02em;}
  .sync{display:inline-flex;align-items:center;gap:5px;font:500 11px/1 "Pretendard";color:var(--muted);margin-left:4px;}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:#8A8C84;display:inline-block;}
  .logout{font:500 10.5px/1 "Pretendard";color:var(--muted);background:none;border:1px solid var(--hair-strong);border-radius:6px;padding:3px 7px;cursor:pointer;margin-left:2px;}
  .logout:hover{color:var(--ink);border-color:var(--accent);}
  .login-overlay{position:fixed;inset:0;background:#191919;display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .login-card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
  .login-title{font-family:"Fraunces",serif;font-weight:500;font-size:23px;letter-spacing:-.01em;}
  .login-sub{font:500 12.5px/1.4 "Pretendard";color:var(--muted);margin-bottom:6px;}
  .login-card input{font:450 14px/1 "Pretendard";padding:11px 13px;border-radius:9px;border:1px solid var(--hair-strong);background:var(--surface-2);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
  .login-card input::placeholder{color:#6B7065;}
  .login-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .login-err{font:500 12px/1.4 "Pretendard";color:var(--warn);min-height:14px;}
  .login-btn{font:600 14px/1 "Pretendard";padding:12px;border-radius:9px;border:none;background:var(--accent);color:#191919;cursor:pointer;transition:background .15s;}
  .login-btn:hover{background:var(--mint);}
  .login-btn:disabled{opacity:.6;cursor:default;}
  .login-switch{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;font:500 12.5px/1 "Pretendard";color:var(--muted);}
  .login-link{font:600 12.5px/1 "Pretendard";color:var(--accent);background:none;border:none;cursor:pointer;padding:2px;}
  .login-link:hover{color:var(--mint);}
  .login-ok{font:500 12px/1.4 "Pretendard";color:var(--accent);min-height:14px;}
  .nav{display:flex;gap:6px;align-items:center;}
  .iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--hair-strong);background:var(--surface-2);color:var(--ink);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:background .15s,border-color .15s;}
  .iconbtn:hover{background:var(--accent-soft2);border-color:var(--accent);}
  .today-btn{font:500 12.5px/1 "Pretendard";padding:0 12px;height:30px;border-radius:8px;border:1px solid var(--hair-strong);background:var(--surface-2);color:var(--ink);cursor:pointer;transition:background .15s,border-color .15s;}
  .today-btn:hover{background:var(--accent-soft2);border-color:var(--accent);}

  .dow{display:grid;grid-template-columns:repeat(7,1fr);margin:0 2px 8px;}
  .dow span{font:600 11px/1 "Pretendard";color:var(--muted);text-align:center;letter-spacing:.08em;}
  .dow span.sun{color:#D08574;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cell{
    min-height:68px;background:var(--surface-2);border:1px solid var(--hair);border-radius:10px;padding:6px;
    cursor:pointer;position:relative;display:flex;flex-direction:column;gap:3px;overflow:hidden;
    transition:border-color .15s,box-shadow .15s,background .25s;
  }
  /* grass levels: deeper green = more completed */
  .cell.lvl0{background:#242B20;}
  .cell.lvl1{background:#21503A;}
  .cell.lvl2{background:#2C6E4B;}
  .cell.lvl3{background:#379160;}
  .cell.lvl4{background:#46B877;}
  .cell.dim{opacity:.45;}
  .cell:hover{border-color:var(--hair-strong);}
  .cell.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .cell.dropping{border-color:var(--mint);box-shadow:0 0 0 2px var(--accent-soft);}
  .num{font-family:"Fraunces",serif;font-weight:500;font-size:14px;color:#EDF0E8;width:23px;height:23px;display:grid;place-items:center;border-radius:50%;flex:none;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  .num.sun{color:#E7B6A8;}
  .cell.today .num{box-shadow:0 0 0 2px var(--mint);}
  .cell.lvl3 .num,.cell.lvl4 .num{color:#0E1F15;text-shadow:none;}
  .cell.lvl4 .num.sun,.cell.lvl3 .num.sun{color:#5A1E12;}
  .chips{display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .chip{font:500 11px/1.25 "Pretendard";padding:3px 6px;border-radius:6px;background:rgba(8,12,9,.42);color:#E3E7DF;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;display:flex;align-items:center;gap:4px;border:1px solid transparent;}
  .chip:active{cursor:grabbing;}
  .chip.done{background:rgba(8,12,9,.28);color:#A9B0A0;text-decoration:line-through;}
  .chip.routine{background:rgba(120,90,30,.4);color:#EAD9AC;cursor:default;}
  .chip .rdot{font-size:9px;opacity:.75;}
  .more{font:600 10px/1 "Pretendard";color:#C9D2C4;padding-left:2px;opacity:.8;}

  .savenote{font:500 11px/1 "Pretendard";color:var(--muted);text-align:center;padding:11px;border-top:1px solid var(--hair);}

  /* grass legend */
  .legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:10px;font:500 10.5px/1 "Pretendard";color:var(--muted);}
  .legend .sw{width:13px;height:13px;border-radius:3px;border:1px solid var(--hair);}
  .legend .l0{background:#21271F;}.legend .l1{background:#21503A;}.legend .l2{background:#2C6E4B;}.legend .l3{background:#379160;}.legend .l4{background:#46B877;}

  @media (max-width:760px){
    body{padding:8px;}
    .panels{grid-template-columns:1fr;gap:26px;}
    .week-body{flex-direction:column;align-items:stretch;gap:14px;}
    .cell{min-height:56px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  html,body{scrollbar-width:none;-ms-overflow-style:none;}
  html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>
</head>
<body>
<div id="login" class="login-overlay" style="display:none">
  <div class="login-card">
    <div class="login-title" id="loginTitle">로그인</div>
    <div class="login-sub" id="loginSub">계정으로 로그인하면 어느 기기에서든 내 기록이 보여요</div>
    <input type="email" id="loginEmail" placeholder="이메일" autocomplete="username">
    <input type="password" id="loginPw" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-switch">
      <span id="switchText">계정이 없나요?</span>
      <button class="login-link" id="switchBtn">회원가입</button>
    </div>
  </div>
</div>
<div class="wrap">
  <!-- top row: todo + routine -->
  <div class="panels">
    <!-- col 1: today's todo -->
    <div class="col">
      <div class="ph">
        <h3 id="dayTitle">오늘 할 일</h3>
        <span class="sub" id="dayDate"></span>
      </div>
      <div class="todo" id="todo"></div>
      <div class="add">
        <input type="text" id="taskInput" placeholder="이 날짜에 할 일 추가" maxlength="80">
        <button id="taskAdd">추가</button>
      </div>
    </div>

    <!-- col 2: routines -->
    <div class="col">
      <div class="ph">
        <h3>루틴</h3>
        <span class="sub">반복 일정</span>
      </div>
      <div class="rt-list" id="rtList"></div>
      <button class="rt-toggle" id="rtToggle">+ 루틴 추가</button>
      <div class="rt-form" id="rtForm">
        <input type="text" id="rtText" placeholder="루틴 이름 (예: 영어 단어 30개)" maxlength="40">
        <div class="seg">
          <button data-freq="weekly" class="on" id="freqWeekly">매주</button>
          <button data-freq="monthly" id="freqMonthly">매달</button>
        </div>
        <div id="weeklyPick">
          <div class="hint" style="margin-bottom:6px">요일 선택 (여러 개 가능)</div>
          <div class="picker" id="wdayPicker"></div>
        </div>
        <div id="monthlyPick" style="display:none">
          <div class="row"><span class="hint">매달</span><select class="mday" id="mdaySelect"></select><span class="hint">일</span></div>
        </div>
        <button class="submit" id="rtSubmit">루틴 만들기</button>
      </div>
    </div>
  </div>

  <!-- week achievement: full width -->
  <div class="week-section">
    <div class="ph">
      <h3>이번 주 달성</h3>
      <span class="sub" id="weekRange"></span>
    </div>
    <div class="week-body">
      <div class="bars" id="bars"></div>
      <div class="summary">
        <span class="pct" id="weekPct">0%</span>
        <span class="desc" id="weekDesc"></span>
      </div>
    </div>
  </div>

  <!-- calendar bottom -->
  <div class="cal-section">
    <div class="cal-head">
      <div class="titlewrap">
        <h3>달력</h3>
        <span class="ym" id="ym"></span>
        <span class="sync" id="sync"></span>
      </div>
      <div class="nav">
        <button class="today-btn" id="todayBtn">오늘</button>
        <button class="iconbtn" id="prev" aria-label="이전 달">‹</button>
        <button class="iconbtn" id="next" aria-label="다음 달">›</button>
      </div>
    </div>
    <div class="dow"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <span>적음</span>
      <span class="sw l0"></span><span class="sw l1"></span><span class="sw l2"></span><span class="sw l3"></span><span class="sw l4"></span>
      <span>완료 많음</span>
    </div>
  </div>
</div>

<script>

   1) SUPABASE_URL      : 프로젝트 URL   (예: https://abcd1234.supabase.co)
   2) SUPABASE_ANON_KEY : anon public 키
   데이터는 로그인한 계정별로 자동 분리돼요. (계정마다 자기 것만 보임)
   설정 안 하면 자동으로 '이 기기에만 저장' 모드로 동작해요. */
const SUPABASE_URL      = 'https://gcbpnrcawsfvrmikbvba.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2GXCPUVT_Kz57Qg5J-f-Sg_16UO3Yc6';

const remoteEnabled = SUPABASE_URL && !SUPABASE_URL.includes('YOUR-PROJECT') && !SUPABASE_ANON_KEY.includes('YOUR-ANON');

/* ===== local cache ===== */
const LKEY='planner-data-v2';

/* ===== auth (email + password) ===== */
const SKEY='planner-session';
let session=null;          // {access_token, refresh_token, expires_at, email, user_id}
function loadSession(){ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function saveSession(s){ session=s; try{ s?localStorage.setItem(SKEY,JSON.stringify(s)):localStorage.removeItem(SKEY); }catch(e){} }
function setSessionFrom(j,email){
  saveSession({
    access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at:Date.now()+(j.expires_in||3600)*1000,
    email:(j.user&&j.user.email)||email,
    user_id:(j.user&&j.user.id)||null
  });

async function signIn(email,password){
  const res=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
    method:'POST', headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email,password})
  });
  const j=await res.json();
  if(!res.ok) throw new Error(j.error_description||j.msg||j.error||'로그인 실패');
  setSessionFrom(j,email);
}
async function signUp(email,password){
  const res=await fetch(`${SUPABASE_URL}/auth/v1/signup`,{
    method:'POST', headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email,password})
  });
  const j=await res.json();
  if(!res.ok) throw new Error(j.error_description||j.msg||j.error||'가입 실패');
  if(j.access_token){ setSessionFrom(j,email); return true; }  // 바로 로그인됨
  return false;                                                // 이메일 인증 필요
}
async function refreshSession(){
  if(!session||!session.refresh_token) throw new Error('no session');
  const res=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
    method:'POST', headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({refresh_token:session.refresh_token})
  });
  const j=await res.json();
  if(!res.ok) throw new Error('refresh failed');
  saveSession({access_token:j.access_token,refresh_token:j.refresh_token,expires_at:Date.now()+(j.expires_in||3600)*1000, email:session.email, user_id:session.user_id||(j.user&&j.user.id)});
}
async function ensureToken(){
  if(!session) throw new Error('로그인이 필요해요');
  if(Date.now() > session.expires_at - 60000) await refreshSession();
  return session.access_token;
}
function signOut(){ saveSession(null); showLogin(); setStatus('local'); }

/* ===== remote (per-user, keyed by user_id; RLS returns only your row) ===== */
async function fetchRemote(){
  const token=await ensureToken();
  const res=await fetch(`${SUPABASE_URL}/rest/v1/planner?select=data`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token}});
  if(!res.ok) throw new Error('GET '+res.status);
  const rows=await res.json();
  return rows[0]?rows[0].data:null;
}
async function pushRemote(){
  const token=await ensureToken();
  const body=[{user_id:session.user_id,data:state,updated_at:new Date().toISOString()}];
  const res=await fetch(`${SUPABASE_URL}/rest/v1/planner?on_conflict=user_id`,{
    method:'POST',
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error('POST '+res.status);
}

/* ===== save = local now + debounced remote push ===== */
let pushTimer=null;
function save(){
  saveLocal();
  if(!remoteEnabled || !session){ setStatus(remoteEnabled?'offline':'local'); return; }
  setStatus('saving');
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{ try{ await pushRemote(); setStatus('synced'); }catch(e){ setStatus('offline'); } },600);
}

/* ===== sync status pill ===== */
function setStatus(s){
  const el=document.getElementById('sync'); if(!el) return;
  const who=session&&session.email?' · '+session.email.split('@')[0]:'';
  const map={
    loading:['#8A8C84','불러오는 중…'],
    saving:['#C8A24A','저장 중…'],
    synced:['#56C07C','동기화됨'+who],
    offline:['#C97B5E','오프라인 · 이 기기에 저장'],
    local:['#8A8C84','이 기기에 저장']
  };
  const [c,t]=map[s]||map.local;
  el.innerHTML=`<span class="dot" style="background:${c}"></span>${t}`+
    (session?` <button class="logout" onclick="signOut()">로그아웃</button>`:'');
}

/* ===== login overlay ===== */
function showLogin(){ const o=document.getElementById('login'); if(o) o.style.display='flex'; }
function hideLogin(){ const o=document.getElementById('login'); if(o) o.style.display='none'; }

/* ===== initial sync ===== */
async function pullAndRender(){
  setStatus('loading');
  try{
    const remote=await fetchRemote();
    if(remote){ state=remote; saveLocal(); render(); }
    else { await pushRemote(); }
    setStatus('synced');
  }catch(e){ setStatus('offline'); }
}
async function initSync(){
  if(!remoteEnabled){ setStatus('local'); hideLogin(); return; }
  session=loadSession();
  if(!session){ showLogin(); return; }
  try{ await ensureToken(); hideLogin(); await pullAndRender(); }
  catch(e){ saveSession(null); showLogin(); }
}

/* ===== state ===== */
let state = loadLocal() || { tasks:[], routines:[], routineDone:{} };
let view = new Date();
let selected = new Date();

/* ===== date helpers ===== */
function key(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function sameDay(a,b){ return key(a)===key(b); }
function todayKey(){ return key(new Date()); }
function uid(){ return Math.random().toString(36).slice(2,9); }
const WD=['일','월','화','수','목','금','토'];

/* ===== routines ===== */
function routinesForDate(d){
  const wd=d.getDay(), dom=d.getDate();
  return state.routines.filter(r=> r.freq==='weekly' ? r.weekdays.includes(wd) : r.monthday===dom )
    .map(r=>{ const k='r:'+r.id+':'+key(d); return {id:k,routineId:r.id,text:r.text,date:key(d),done:!!state.routineDone[k],routine:true}; });
}
function tasksForDate(d){ const k=key(d); return [...routinesForDate(d), ...state.tasks.filter(t=>t.date===k)]; }
function statsForDate(d){ const it=tasksForDate(d); return {total:it.length, done:it.filter(i=>i.done).length}; }

/* ===== mutations ===== */
function toggle(item){
  if(item.routine){ if(state.routineDone[item.id]) delete state.routineDone[item.id]; else state.routineDone[item.id]=true; }
  else{ const t=state.tasks.find(x=>x.id===item.id); if(t) t.done=!t.done; }
  save(); render();
}
function removeTask(id){ state.tasks=state.tasks.filter(t=>t.id!==id); save(); render(); }
function addTask(text,date){ if(!text.trim())return; state.tasks.push({id:uid(),text:text.trim(),date,done:false}); save(); render(); }
function moveTask(id,date){ const t=state.tasks.find(x=>x.id===id); if(t){ t.date=date; save(); render(); } }

/* ===== calendar ===== */
function grassLevel(s){
  if(s.total===0) return -1;
  const r=s.done/s.total;
  if(r===0) return 0;
  if(r<=0.33) return 1;
  if(r<=0.66) return 2;
  if(r<1) return 3;
  return 4;
}
function renderCalendar(){
  document.getElementById('ym').textContent=view.getFullYear()+'년 '+(view.getMonth()+1)+'월';
  const grid=document.getElementById('grid'); grid.innerHTML='';
  const y=view.getFullYear(), m=view.getMonth();
  const first=new Date(y,m,1);
  const start=new Date(first); start.setDate(1-first.getDay());
  const daysInMonth=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((first.getDay()+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const cell=document.createElement('div'); cell.className='cell';
    const lvl=grassLevel(statsForDate(d));
    if(lvl>=0) cell.classList.add('lvl'+lvl);
    if(d.getMonth()!==view.getMonth()) cell.classList.add('dim');
    if(key(d)===todayKey()) cell.classList.add('today');
    if(sameDay(d,selected)) cell.classList.add('selected');

    const num=document.createElement('div'); num.className='num'+(d.getDay()===0?' sun':''); num.textContent=d.getDate(); cell.appendChild(num);

    const chips=document.createElement('div'); chips.className='chips';
    const items=tasksForDate(d);
    items.slice(0,2).forEach(it=>{
      const c=document.createElement('div'); c.className='chip'+(it.done?' done':'')+(it.routine?' routine':''); c.textContent=it.text;
      if(it.routine){ const dot=document.createElement('span'); dot.className='rdot'; dot.textContent='⟳'; c.prepend(dot); }
      else{ c.draggable=true; c.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/plain',it.id); e.dataTransfer.effectAllowed='move'; }); }
      chips.appendChild(c);
    });
    if(items.length>2){ const m=document.createElement('div'); m.className='more'; m.textContent='+'+(items.length-2); chips.appendChild(m); }
    cell.appendChild(chips);

    cell.addEventListener('click',()=>{ selected=d; render(); });
    cell.addEventListener('dragover',e=>{ e.preventDefault(); cell.classList.add('dropping'); e.dataTransfer.dropEffect='move'; });
    cell.addEventListener('dragleave',()=>cell.classList.remove('dropping'));
    cell.addEventListener('drop',e=>{ e.preventDefault(); cell.classList.remove('dropping'); const id=e.dataTransfer.getData('text/plain'); if(id && !id.startsWith('r:')) moveTask(id,key(d)); });
    grid.appendChild(cell);
  }
}

/* ===== todo ===== */
function renderTodo(){
  const isToday=key(selected)===todayKey();
  document.getElementById('dayTitle').textContent=isToday?'오늘 할 일':'할 일';
  document.getElementById('dayDate').textContent= isToday ? '' : `${selected.getMonth()+1}월 ${selected.getDate()}일 (${WD[selected.getDay()]})`;
  const wrap=document.getElementById('todo'); wrap.innerHTML='';
  const items=tasksForDate(selected);
  if(items.length===0){ const e=document.createElement('div'); e.className='empty'; e.textContent='할 일이 없어요. 아래에 추가해 보세요.'; wrap.appendChild(e); return; }
  items.forEach(it=>{
    const row=document.createElement('div'); row.className='item'+(it.done?' done':'');
    const cb=document.createElement('div'); cb.className='cb'; cb.setAttribute('role','checkbox'); cb.setAttribute('aria-checked',it.done); cb.tabIndex=0;
    cb.innerHTML='<svg viewBox="0 0 12 12"><polyline points="2,6.5 5,9 10,3"/></svg>';
    cb.addEventListener('click',()=>toggle(it));
    cb.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(it);} });
    const lab=document.createElement('div'); lab.className='label'; lab.textContent=it.text; lab.addEventListener('click',()=>toggle(it));
    row.appendChild(cb); row.appendChild(lab);
    if(it.routine){ const tg=document.createElement('span'); tg.className='tag'; tg.textContent='⟳ 루틴'; row.appendChild(tg); }
    else{ const del=document.createElement('button'); del.className='del'; del.textContent='×'; del.title='삭제'; del.addEventListener('click',()=>removeTask(it.id)); row.appendChild(del); }
    wrap.appendChild(row);
  });
}

/* ===== week chart ===== */
function renderChart(){
  const start=new Date(selected); start.setDate(selected.getDate()-selected.getDay());
  const bars=document.getElementById('bars'); bars.innerHTML=''; let totDone=0, totAll=0;
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const s=statsForDate(d); totDone+=s.done; totAll+=s.total; const ratio=s.total?s.done/s.total:0;
    const col=document.createElement('div'); col.className='bcol'+(key(d)===todayKey()?' is-today':'');
    const cap=document.createElement('div'); cap.className='bcap'; cap.textContent=s.total?Math.round(ratio*100)+'%':'';
    const track=document.createElement('div'); track.className='btrack';
    const fill=document.createElement('div'); fill.className='bfill'+(s.total===0?' zero':''); fill.style.height=(s.total?Math.max(ratio*100,6):4)+'%'; track.appendChild(fill);
    const lab=document.createElement('div'); lab.className='blabel'; lab.textContent=WD[d.getDay()];
    col.appendChild(cap); col.appendChild(track); col.appendChild(lab); bars.appendChild(col);
  }
  const end=new Date(start); end.setDate(start.getDate()+6);
  document.getElementById('weekRange').textContent=`${start.getMonth()+1}.${start.getDate()} – ${end.getMonth()+1}.${end.getDate()}`;
  const pct=totAll?Math.round(totDone/totAll*100):0;
  document.getElementById('weekPct').textContent=pct+'%';
  document.getElementById('weekDesc').textContent= totAll? `${totAll}개 중 ${totDone}개 완료` : '이번 주에 등록된 할 일이 없어요';
}

/* ===== routines render ===== */
function renderRoutines(){
  const list=document.getElementById('rtList'); list.innerHTML='';
  if(state.routines.length===0){ const e=document.createElement('div'); e.style.cssText='font:450 12px/1.4 Pretendard;color:var(--muted);padding:2px'; e.textContent='반복되는 할 일을 루틴으로 등록하면 매주/매달 자동으로 떠요.'; list.appendChild(e); return; }
  state.routines.forEach(r=>{
    const row=document.createElement('div'); row.className='rt';
    const ic=document.createElement('div'); ic.className='ric'; ic.textContent='⟳';
    const tx=document.createElement('div'); tx.className='rtxt';
    const when= r.freq==='weekly' ? '매주 '+r.weekdays.slice().sort().map(w=>WD[w]).join('·')+'요일' : '매달 '+r.monthday+'일';
    tx.innerHTML=`<b>${escapeHtml(r.text)}</b><span>${when}</span>`;
    const del=document.createElement('button'); del.className='del'; del.textContent='×'; del.title='삭제';
    del.style.cssText='border:none;background:none;cursor:pointer;font-size:16px;color:var(--muted);padding:2px 5px;border-radius:5px';
    del.addEventListener('click',()=>{ state.routines=state.routines.filter(x=>x.id!==r.id); save(); render(); });
    row.appendChild(ic); row.appendChild(tx); row.appendChild(del); list.appendChild(row);
  });
}

function render(){ renderCalendar(); renderTodo(); renderChart(); renderRoutines(); }
function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===== events ===== */
document.getElementById('prev').onclick=()=>{ view.setMonth(view.getMonth()-1); renderCalendar(); };
document.getElementById('next').onclick=()=>{ view.setMonth(view.getMonth()+1); renderCalendar(); };
document.getElementById('todayBtn').onclick=()=>{ view=new Date(); selected=new Date(); render(); };

const taskInput=document.getElementById('taskInput');
function doAddTask(){ addTask(taskInput.value,key(selected)); taskInput.value=''; taskInput.focus(); }
document.getElementById('taskAdd').onclick=doAddTask;
taskInput.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddTask(); });

const rtForm=document.getElementById('rtForm');
document.getElementById('rtToggle').onclick=()=>rtForm.classList.toggle('open');
let curFreq='weekly'; const wdayPicker=document.getElementById('wdayPicker'); let pickedDays=new Set();
WD.forEach((w,i)=>{ const b=document.createElement('button'); b.textContent=w; b.onclick=()=>{ if(pickedDays.has(i)){pickedDays.delete(i);b.classList.remove('on');}else{pickedDays.add(i);b.classList.add('on');} }; wdayPicker.appendChild(b); });
const mdaySelect=document.getElementById('mdaySelect'); for(let i=1;i<=31;i++){ const o=document.createElement('option'); o.value=i; o.textContent=i; mdaySelect.appendChild(o); }
document.getElementById('freqWeekly').onclick=()=>{ curFreq='weekly'; setFreqUI(); };
document.getElementById('freqMonthly').onclick=()=>{ curFreq='monthly'; setFreqUI(); };
function setFreqUI(){
  document.getElementById('freqWeekly').classList.toggle('on',curFreq==='weekly');
  document.getElementById('freqMonthly').classList.toggle('on',curFreq==='monthly');
  document.getElementById('weeklyPick').style.display=curFreq==='weekly'?'block':'none';
  document.getElementById('monthlyPick').style.display=curFreq==='monthly'?'block':'none';
}
document.getElementById('rtSubmit').onclick=()=>{
  const text=document.getElementById('rtText').value.trim(); if(!text){ document.getElementById('rtText').focus(); return; }
  if(curFreq==='weekly'){ if(pickedDays.size===0){ alert('요일을 하나 이상 선택해 주세요.'); return; } state.routines.push({id:uid(),text,freq:'weekly',weekdays:[...pickedDays]}); }
  else{ state.routines.push({id:uid(),text,freq:'monthly',monthday:Number(mdaySelect.value)}); }
  document.getElementById('rtText').value=''; pickedDays.clear(); wdayPicker.querySelectorAll('button').forEach(b=>b.classList.remove('on')); rtForm.classList.remove('open');
  save(); render();
};

/* ===== login / signup form ===== */
let authMode='login'; // 'login' | 'signup'
function setAuthMode(m){
  authMode=m;
  const t=document.getElementById('loginTitle'), s=document.getElementById('loginSub'),
        b=document.getElementById('loginBtn'), sw=document.getElementById('switchText'),
        sb=document.getElementById('switchBtn'), pw=document.getElementById('loginPw'),
        err=document.getElementById('loginErr');
  err.textContent='';
  if(m==='signup'){
    t.textContent='회원가입'; s.textContent='이메일로 계정을 만들면 내 데이터가 따로 저장돼요';
    b.textContent='가입하기'; sw.textContent='이미 계정이 있나요?'; sb.textContent='로그인';
    pw.setAttribute('autocomplete','new-password');
  }else{
    t.textContent='로그인'; s.textContent='계정으로 로그인하면 어느 기기에서든 내 기록이 보여요';
    b.textContent='로그인'; sw.textContent='계정이 없나요?'; sb.textContent='회원가입';
    pw.setAttribute('autocomplete','current-password');
  }
}
document.getElementById('switchBtn').onclick=()=>setAuthMode(authMode==='login'?'signup':'login');

async function doAuth(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr'); err.style.color=''; err.textContent='';
  const btn=document.getElementById('loginBtn');
  if(!email||!pw){ err.textContent='이메일과 비밀번호를 입력해 주세요'; return; }
  btn.disabled=true; const orig=btn.textContent; btn.textContent='처리 중…';
  try{
    if(authMode==='signup'){
      const loggedIn=await signUp(email,pw);
      if(!loggedIn){
        err.style.color='var(--accent)';
        err.textContent='가입 완료! 메일로 온 인증 링크를 누른 뒤 로그인해 주세요.';
        setAuthMode('login'); btn.disabled=false; btn.textContent='로그인'; return;
      }
    }else{
      await signIn(email,pw);
    }
    hideLogin(); await pullAndRender();
  }catch(e){
    const msg=(''+(e.message||e));
    err.textContent = msg.includes('Invalid login') ? '이메일 또는 비밀번호가 맞지 않아요'
      : msg.includes('already registered') ? '이미 가입된 이메일이에요. 로그인해 주세요.'
      : msg.includes('at least') || msg.includes('Password') ? '비밀번호는 6자 이상이어야 해요'
      : msg;
  }finally{ btn.disabled=false; btn.textContent=(authMode==='signup'?'가입하기':'로그인'); }
}
document.getElementById('loginBtn').onclick=doAuth;
document.getElementById('loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doAuth(); });
document.getElementById('loginEmail').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('loginPw').focus(); });

render();
initSync();
</script>
